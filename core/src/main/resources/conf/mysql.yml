#列出数据库中的表 SHOW TABLES [FROM db_name]
showTables: show tables
#列出数据库的表详细信息  SHOW TABLE STATUS [FROM db_name] 查看数据库表信息：select table_name,table_comment from information_schema.tables where table_schema = 'db' and table_name ='tablename'
tabComments: show table status
#列出表的列详细信息 等效语句:SHOW FULL COLUMNS FROM tb_name   查看表字段信息：select column_name, column_comment from information_schema.columns where table_schema ='db' and table_name = 'tablename' ;
tbFields: show full fields from %s
#创建数据库 SQL（使用 {dbName} 占位符）
createDatabase: CREATE DATABASE IF NOT EXISTS `{dbName}` DEFAULT CHARACTER SET utf8mb4
#列出所有数据库
listDatabases: SHOW DATABASES
#检查数据库是否为空（使用数据库函数，不需要占位符）
checkEmptyDatabase: SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = DATABASE()
#表名
tbName: NAME
#表说明
tbComment: COMMENT
#表创建时间
tbCreateTime: Create_time
#字段名
fieldName: FIELD
#字段类型
fieldType: TYPE
#字段注释
fieldComment: COMMENT
#主键名,值为PRI时为主键
fieldKeyValue: 
  key: KEY
  value: PRI
#字段是否为null
fieldNull: 'Null'
#备注 是否自增
extraKeyValue: 
  key: extra
  value: auto_increment

# 类型映射 (覆盖 common-types.yml)
mappings:
  bigint: Long
  int: Integer
  tinyint: Integer
  smallint: Integer
  mediumint: Integer
  integer: Integer
  varchar: String
  char: String
  text: String
  longtext: String
  mediumtext: String
  tinytext: String
  datetime: Timestamp
  date: Date
  timestamp: Timestamp
  time: Time
  decimal: BigDecimal
  float: Float
  double: Double
  bit: Boolean
  blob: byte[]
  longblob: byte[]
  mediumblob: byte[]
  tinyblob: byte[]
  binary: byte[]
  varbinary: byte[]

