    driverClassName: com.mysql.jdbc.Driver
    #明文密码
    url: jdbc:mysql://127.0.0.1:3306/db_20260317202850?autoReconnect=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    pwd: 123456
    #数据源密码密文配置
    # 明文密码时值留空或注释;密文密码时配置config
    #filters: config
    # 明文密码时值留空或注释;
    #conProperties: "druid.log.stmt.executableSql=true;druid.stat.logSlowSql=true;druid.stat.slowSqlMillis=5000;config.decrypt=true;config.decrypt.key=MFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBAKvoVokPjMkBOPtHoWk9WC2FWa1Uq+thjE3fvYY6+BB0dn4SZ7NLOGLR+6l1Qc/XBPBBaiy33MlSUjvkS4cd+vUCAwEAAQ=="

#全局配置
global:
    #生成文件的输出目录(注意此目录需要有写权限),最后一个子目录为项目名,如:/output/test，项目名为test
    outputDir: ./demo
    # PDF 中文字体配置
    # 格式：目录路径:文件名模式（支持 * 通配符），多项用逗号分隔
    # 系统按配置顺序依次查找，返回第一个匹配的字体文件
    fontConfigsMacOS: /System/Library/Fonts/Supplemental:Arial Unicode.ttf, /System/Library/Fonts:PingFang*.ttc, /System/Library/Fonts:STHeiti*.ttc, /System/Library/Fonts:Hiragino*.ttc, /Library/Fonts:*.ttf
    fontConfigsWindows: C:/Windows/Fonts:simhei.ttf, C:/Windows/Fonts:simsun.ttc, C:/Windows/Fonts:msyh.ttc, C:/Windows/Fonts:msyh*.ttc
    fontConfigsLinux: /usr/share/fonts/truetype/droid:DroidSansFallback*.ttf, /usr/share/fonts/truetype/wqy:wqy-microhei*.ttc, /usr/share/fonts/opentype/noto:NotoSansCJK*.ttc, /usr/share/fonts/truetype/noto:NotoSansCJK*.ttf, /usr/share/fonts:*.ttf
    #项目描述
    description: 代码生成器
    #是否删除输出目录,默认为false，注意：修改需谨慎！ 
    delOutputDir: false
    #是否覆盖已有文件      
    fileOverride: true
    #文件生成后是否打开输出目录
    openDir: false
    #父包名
    rootPackage: com.hyw.generator
    #工程模块配置:单工程配置空；多模块工程配置模块名数组，如：['api','app'] 
    modules: ['api','app'] 
    #需要包含的表名（exclude优先级高）示例：[ 'user','order'] 
    include: 
    #需要排除的表名
    exclude: 
    #表前缀
    tablePrefix: ['cw_','batch_','tb_']
    #支持组件见枚举类Component，可选组件：SENTINEL,SKYWALKING
    components: [MYBATIS,SPRINGMVC,SPRINGBOOT,SPRINGCLOUD,SWAGGER2,REDIS,JWT,SHIRO,VUE,SENTINEL,SKYWALKING]
    #生成构建脚本/工程构建工具,可选值MAVEN:生成pom.xml、GRADLE:生成build.gradle、不配置:不生成构建脚本
    projectBuilder: MAVEN
    #工程默认版本号
    version: 1.0.1-SNAPSHOT
    #开发人员
    author: heyw
    #版权
    copyright: hyw Copyright (c) 2017-2020 All Rights Reserved.
    #jdk版本
    javaVersion: 17
    #表名、字段名、是否使用下划线命名
    separators: [_,-]
    #是否大写命名
    capitalMode: false
    #数据库表映射到实体的命名策略  
    naming: TOCAMEL
    #是否生成字段常量,默认 false） 
    columnConstant: false
    #生成文件的编码
    encoding: UTF-8
    #模板文件目录,自定义模板时复制此目录，并修改此目录名
    templateDir: /templates
    #java源码目录
    sourceDirectory: src/main/java
    #资源文件目录
    resourceDirectory: src/main/resources
    #非模板文件排除渲染 
    resources: [ 'css','dll','exe','eot','png','jpg','gif','swf','svg','ttf','woff','woff2','eot','min.js','min.css']
    #模板引擎类型，可选值：freemarker, velocity
    templateEngine: freemarker
# 组件配置    
components: 
  DUBBO: 
    dubbo_version: 3.3.0
    springboot_dubbo_version: 1.0.0-SNAPSHOT
    dubbo_registry: zookeeper://localhost:2181?backup=localhost:2182,localhost:2183
    dubbo_port: 20800
    dubbo_protocol: dubbo 
  ZOOKEEPER: 
    connect_string: zk-server:2181
    curator_version: '4.0.1'
  NACOS: 
    server_addr: nacos-server:8848
    namespace: ''
    group: DEFAULT_GROUP
    username: nacos
    password: nacos
  ROCKETMQ: 
    spring_boot_starter_rocketmq_version: 0.0.4  
    name_server_address: mq-server:9876    
  SPRINGBOOT:
    springboot_version: 3.2.12
    spring_version: 6.1.5
    lombok_version: 1.18.20
    disruptor_version: 3.4.2
    write_null_value: true
    server_port: 8082
    ssl: false
  SPRINGCLOUD:
    springcloud_version: 2023.0.0
    springcloud_commons_version: 4.1.0
    springcloud_alibaba_version: 2023.0.1.0
    spring_cloud_zookeeper_version: 4.1.0
  REDIS: 
    spring_redis_password: 123456
    spring_redis_cluster_nodes: redis-server:7001, redis-server:7002, redis-server:7003, redis-server:8001, redis-server:8002, redis-server:8003
  JWT:
    jwt_version: 0.12.6
  SHIRO:
    shiro_version: 2.0.2
  SWAGGER2: 
    title: "RESTful API"   
    desc: "Swagger2构建RESTful API"
    swagger_version: 2.9.2
    swagger_ui_version: 1.9.6
  ZIPKIN: 
    zipkin_version: '1.0.2'
    zipkin_baseUrl: http://zipkin-server:9411
  MYBATIS: 
    # TODO mapperType改为sqlType: xml(XML mapper文件) / annotation(SQL注解)
    #sqlType: xml
    mapperType: plus
    #版本号配置
    mybatis_spring_boot_version: 3.0.3
    mybatis_plus_version: 3.5.8
    pagehelper_version: 2.1.0
    druid_version: 1.2.23
    mysql_connector_version: 8.0.33
    #Mapper父类配置:
    #- mybatis-plus: 使用MyBatis-Plus内置BaseMapper（不生成BaseMapper.java）
    #- BaseMapper: 使用模板生成自定义BaseMapper.java
    #- 全类名: 直接引用自定义父类（不生成BaseMapper.java）
    #superMapperClass: mybatis-plus
    superMapperClass: BaseMapper
    #Entity父类的公共字段
    superEntityColumns: ''
    #entity的父类,自定义父类必须写全类名（包含类的包名）
    superEntityClass: BaseEntity
    #service父类,如配置自定义类需写全类名(含包名)
    superServiceClass: BaseService
    #service实现类父类,如配置自定义类需写全类名(含包名)
    superServiceImplClass: BaseServiceImpl
    #Cache注意事项：1、只有单表操作的表上使用缓存(和该表有关的全部操作必须全部在一个namespace下)2、查询远远大于更新3、多表操作一定不能使用缓存
    #缓存是以namespace为单位的，不同namespace下的操作互不影响,更新操作会清空所在namespace下的全部缓存
    #二级缓存配置,推荐配置false
    enableCache: false
    #緩存磁盤存儲路徑
    cachePath: /cache
    #是否生成resultMap配置
    baseResultMap: true
    #是否生成sql字段(公共查询用)
    columns: true
    #mapper.xml是否生成insert配置
    insert: true
    #mapper.xml是否生成update
    update: true
    #mapper.xml是否生成
    findById: true
    findOne: true
    count: true
    findPage: true
    deleteById: true
    findAll: true

  JPA: 
    version: 1.5.6.RELEASE
    
  SPRINGMVC: 
    controllerName: '%sController'
    controllerPackage: controller
    resourceDir: spring
    rest: true
    crud: true
    superControllerClass: BaseController
    json_type: fastjson
    jsonp: false
  THYMELEAF: 
    suffix: .html
  VUE: 
    assetsDir: 'static'
    filenameHashing: true
    productionSourceMap: false
  SENTINEL:
    sentinel_version: 1.8.6
    dashboard.server: localhost:7030
    dashboard.port: 8719
    api:
      port: 8719
    app:
      type: 1
  SKYWALKING: 
    skywalking.addr: localhost:11800
    skywalking.agent: /usr/local/skywalking
    skywalking.agent-home: /usr/local/skywalking-es7    
