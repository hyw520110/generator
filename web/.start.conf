# 通用启动脚本配置文件
# 文件名格式: <hash>.conf
# 其中 <hash> 是项目路径的 MD5 哈希值前8位
#
# 优先级：环境变量 > 命令行参数 > 本配置文件 > 脚本内置默认值
#
# 使用方式：
#   1. 项目级：放置于源码根目录，由 package.sh 自动生成
#   2. 部署级：由部署脚本拷贝到部署目录
#   3. 全局级：放置于 ~/.config/<hash>.conf，支持多项目

# ============================================
# 服务依赖启动顺序配置
# ============================================
# 按依赖顺序定义服务名称，脚本将按此顺序批量启动服务
#
# 适用场景：
#   - Maven 单模块工程：无需配置（部署模式下自动单服务启动）
#   - Maven 多模块工程：由 package.sh 自动生成
#
# 示例：SERVICE_DEPENDENCY_ORDER=("order-service" "user-service" "gateway-service")
SERVICE_DEPENDENCY_ORDER=()

# ============================================
# 网络配置（可选，也可通过命令行参数指定）
# ============================================
# 获取当前IP时忽略的网卡（逗号分隔，支持通配符*）
# 默认值：uengine0,xdroid0,br*,ve*
# NETWORK_IGNORED=uengine0,xdroid0,br*,ve*

# 当前内网首选网卡
# 默认值：eth0
# NETWORK_PREFERRED=eth0

# ============================================
# 路径配置（可选，也可通过命令行参数指定）
# ============================================
# 服务基础目录（批量启动时查找服务的根目录）
# 默认值：$HOME/webapps
# SERVICES_BASE_DIR=$HOME/webapps

# ============================================
# 日志检测关键词配置（可选）
# ============================================
# 启动成功检测关键词（正则表达式，支持多个用|分隔）
# 默认值：适配 Spring Boot 的启动成功日志
# SUCCESS_KEYWORDS="Started .*Application in|Tomcat started on port|Application startup completed|已启动|应用已启动|服务已启动"

# 启动失败/错误检测关键词（正则表达式，支持多个用|分隔）
# 默认值：适配 Java 应用的常见错误
# ERROR_KEYWORDS="Failed to start|Error starting ApplicationContext|Application startup failed|java.lang.OutOfMemoryError|Caused by:.*Exception|BindException|BeanCreationException"

# ============================================
# JVM 配置（可选）
# ============================================
# 默认 JVM 参数
# 默认值：-Xms512m -Xmx1024m
# DEFAULT_JVM_OPTS="-Xms512m -Xmx1024m"

# ============================================
# SkyWalking 配置（可选）
# ============================================
# 是否启用 SkyWalking 代理
# 默认值：true
# SKYWALKING_ENABLED=true

# SkyWalking 服务端地址
# 默认值：sw-server:11800
# SKYWALKING_SERVER="sw-server:11800"

# ============================================
# 端口配置（可选）
# ============================================
# 端口排除正则（检测端口时忽略的端口，如 Dubbo QOS 端口）
# 默认值：排除以 222 开头的 5 位端口（22200-22299）
# PORT_EXCLUDE_PATTERN="^222[0-9]{2}$"

# ============================================
# 超时配置（可选）
# ============================================
# 默认启动超时时间（秒）
# 默认值：30
# DEFAULT_STARTUP_TIMEOUT=30

# 默认调试端口
# 默认值：5005
# DEFAULT_DEBUG_PORT=5005

# 日志上下文行数（错误时显示的日志行数）
# 默认值：50
# DEFAULT_LOG_CONTEXT=50
